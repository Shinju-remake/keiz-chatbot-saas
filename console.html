<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shinju AI | Universal Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #BB00FF;
            --primary-glow: rgba(187, 0, 255, 0.5);
            --dark-bg: #050505;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Geist', 'Inter', -apple-system, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: row;
            overflow: hidden;
            letter-spacing: -0.01em;
        }

        /* BACKGROUND DECORATION */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 20%, rgba(187, 0, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(187, 0, 255, 0.05) 0%, transparent 40%);
            pointer-events: none;
            z-index: -1;
        }

        /* SIDEBAR */
        #sidebar {
            width: 80px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 0;
            border-right: 1px solid var(--glass-border);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
        }

        #sidebar:hover { width: 260px; }

        .brand { 
            font-weight: 900; 
            color: var(--primary); 
            font-size: 1.5rem; 
            margin-bottom: 48px; 
            text-shadow: 0 0 20px var(--primary-glow); 
            white-space: nowrap; 
            overflow: hidden;
            letter-spacing: 0.1em;
        }

        .nav-item {
            width: 100%; 
            padding: 14px 28px; 
            display: flex; 
            align-items: center; 
            cursor: pointer; 
            color: var(--text-muted); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 2px solid transparent; 
            text-decoration: none;
            position: relative;
        }
        
        .nav-item:hover { 
            color: white; 
            background: rgba(255, 255, 255, 0.03); 
        }
        
        .nav-item.active { 
            color: var(--primary); 
            background: rgba(187, 0, 255, 0.05); 
            border-left-color: var(--primary); 
        }

        .nav-item .icon { 
            font-size: 1.25rem; 
            min-width: 24px; 
            margin-right: 20px;
            filter: grayscale(1);
            transition: filter 0.3s;
        }
        .nav-item.active .icon, .nav-item:hover .icon { filter: grayscale(0); }

        .nav-item .label { 
            font-size: 0.875rem; 
            font-weight: 500; 
            opacity: 0; 
            transition: opacity 0.3s ease; 
            white-space: nowrap; 
        }
        #sidebar:hover .nav-item .label { opacity: 1; }

        /* MOBILE NAV */
        #mobile-nav { 
            display: none; 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            height: 72px; 
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border); 
            z-index: 1000; 
            justify-content: space-around; 
            align-items: center; 
            padding: 0 12px; 
        }
        
        .m-nav-item { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            color: var(--text-muted); 
            font-size: 0.7rem; 
            cursor: pointer; 
            transition: color 0.3s;
            flex: 1;
        }
        .m-nav-item.active { color: var(--primary); }
        .m-nav-item span { font-size: 1.4rem; margin-bottom: 4px; }

        /* MAIN VIEW */
        #view-container { 
            flex: 1; 
            position: relative; 
            background: transparent;
            overflow: hidden; 
        }
        
        iframe { width: 100%; height: 100%; border: none; display: none; }
        iframe.active { display: block; animation: fadeIn 0.5s ease-out; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #welcome-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 40px;
            z-index: 1;
        }

        .welcome-card {
            background: var(--glass-bg);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            padding: 60px;
            border-radius: 32px;
            max-width: 600px;
            box-shadow: 0 24px 48px -12px rgba(0, 0, 0, 0.5);
        }

        h1 { 
            font-size: 3.5rem; 
            font-weight: 900; 
            margin-bottom: 16px; 
            letter-spacing: -0.04em;
            background: linear-gradient(to bottom, #fff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        p { 
            color: var(--text-muted); 
            font-size: 1.125rem;
            line-height: 1.6;
            margin-bottom: 40px; 
        }

        .btn-group { display: flex; gap: 16px; justify-content: center; }
        
        .btn { 
            padding: 14px 32px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 600; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            font-size: 0.9375rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary { 
            background: var(--primary); 
            color: white; 
            border: none;
            box-shadow: 0 0 20px rgba(187, 0, 255, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(187, 0, 255, 0.5);
            background: #cc33ff;
        }

        .btn-outline { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid var(--glass-border); 
            color: white; 
        }
        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { display: none; }
            #mobile-nav { display: flex; }
            #view-container { margin-bottom: 72px; }
            .welcome-card { padding: 40px 24px; border-radius: 24px; margin: 20px; }
            h1 { font-size: 2.25rem; }
            p { font-size: 1rem; }
            .btn-group { flex-direction: column; width: 100%; }
            .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <!-- Desktop Sidebar -->
    <div id="sidebar">
        <div class="brand">S. AI</div>
        <div class="nav-item active" onclick="switchView('hub', this)">
            <span class="icon">🏠</span><span class="label">Universal Hub</span>
        </div>
        <div class="nav-item" onclick="switchView('agency', this)">
            <span class="icon">🏢</span><span class="label">AI Agency</span>
        </div>
        <div class="nav-item" onclick="switchView('demo', this)">
            <span class="icon">🎭</span><span class="label">Bistro Experience</span>
        </div>
        <div class="nav-item" onclick="switchView('dashboard', this)">
            <span class="icon">⚙️</span><span class="label">Admin Dashboard</span>
        </div>
        <div class="nav-item" onclick="switchView('test', this)" style="margin-top: auto;">
            <span class="icon">🧪</span><span class="label">Technical Sandbox</span>
        </div>
    </div>

    <!-- Mobile Navigation -->
    <div id="mobile-nav">
        <div class="m-nav-item active" onclick="switchView('hub', this)"><span>🏠</span>Hub</div>
        <div class="m-nav-item" onclick="switchView('agency', this)"><span>🏢</span>Agency</div>
        <div class="m-nav-item" onclick="switchView('demo', this)"><span>🎭</span>Demo</div>
        <div class="m-nav-item" onclick="switchView('dashboard', this)"><span>⚙️</span>Admin</div>
    </div>

    <div id="view-container">
        <div id="welcome-screen">
            <div class="welcome-card">
                <h1>SHINJU AI CONSOLE</h1>
                <p>Master control for the Shinju Omni-Engine V3. Navigate between portals to manage your AI fleet with surgical precision.</p>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="window.location.href='/agency'">ENTER AGENCY</button>
                    <button class="btn btn-outline" onclick="window.location.href='/demo_master'">COMMANDER / ORDER</button>
                </div>
            </div>
        </div>

        <iframe id="iframe-agency" src="/agency_static" allow="microphone"></iframe>
        <iframe id="iframe-demo" src="/demo_static" allow="microphone"></iframe>
        <iframe id="iframe-dashboard" src="/dashboard_static" allow="microphone"></iframe>
        <iframe id="iframe-test" src="/test_static" allow="microphone"></iframe>
    </div>

    <!-- GLOBAL WIDGET -->
    <script src="/widget/chat.js"></script>

    <script>
        function switchView(viewId, el) {
            document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
            document.getElementById('welcome-screen').style.display = 'none';
            
            if (viewId === 'hub') {
                document.getElementById('welcome-screen').style.display = 'flex';
            } else {
                const frame = document.getElementById(`iframe-${viewId}`);
                if (frame) {
                    if (viewId === 'dashboard') frame.src = "/dashboard_static#analytics";
                    frame.classList.add('active');
                }
            }

            // Sync Desktop & Mobile active state
            document.querySelectorAll('.nav-item, .m-nav-item').forEach(i => i.classList.remove('active'));
            if (el) el.classList.add('active');
        }
    </script>
</body>
</html>
