<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shinju AI | Universal Console</title>
    <style>
        :root {
            --primary: #BB00FF;
            --dark-bg: #050505;
            --sidebar-bg: #0a0a0a;
            --text-gray: #888;
            --accent: #00ff88;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--dark-bg);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: row;
            overflow: hidden;
        }

        /* SIDEBAR (Desktop) */
        #sidebar {
            width: 80px;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            border-right: 1px solid rgba(255,255,255,0.05);
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
        }

        #sidebar:hover { width: 240px; }

        .brand { font-weight: 900; color: var(--primary); font-size: 1.5rem; margin-bottom: 40px; text-shadow: 0 0 10px rgba(187, 0, 255, 0.5); white-space: nowrap; overflow: hidden; }

        .nav-item {
            width: 100%; padding: 15px 25px; display: flex; align-items: center; cursor: pointer; color: var(--text-gray); transition: 0.2s; border-left: 3px solid transparent; text-decoration: none;
        }
        .nav-item:hover { color: white; background: rgba(187, 0, 255, 0.1); }
        .nav-item.active { color: var(--primary); background: rgba(187, 0, 255, 0.05); border-left-color: var(--primary); }
        .nav-item .icon { font-size: 1.2rem; min-width: 30px; margin-right: 15px; }
        .nav-item .label { font-size: 0.9rem; font-weight: 600; opacity: 0; transition: opacity 0.2s; white-space: nowrap; }
        #sidebar:hover .nav-item .label { opacity: 1; }

        /* MOBILE NAV (Bottom Bar) */
        #mobile-nav { display: none; position: fixed; bottom: 0; left: 0; width: 100%; height: 60px; background: var(--sidebar-bg); border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000; justify-content: space-around; align-items: center; padding: 0 10px; }
        .m-nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-gray); font-size: 0.7rem; cursor: pointer; }
        .m-nav-item.active { color: var(--primary); }
        .m-nav-item span { font-size: 1.2rem; margin-bottom: 2px; }

        /* MAIN VIEW */
        #view-container { flex: 1; position: relative; background: var(--dark-bg); overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; display: none; }
        iframe.active { display: block; }

        #welcome-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px;
            background: radial-gradient(circle at center, rgba(187, 0, 255, 0.05) 0%, transparent 70%);
        }

        h1 { font-size: 2.5rem; font-weight: 900; margin-bottom: 10px; }
        p { color: var(--text-gray); max-width: 500px; margin-bottom: 30px; }

        .btn-group { display: flex; gap: 15px; }
        .btn { padding: 12px 25px; border-radius: 50px; cursor: pointer; font-weight: 700; transition: 0.3s; font-size: 0.9rem; }
        .btn-primary { background: var(--primary); color: white; border: none; }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: white; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { display: none; }
            #mobile-nav { display: flex; }
            #view-container { margin-bottom: 60px; }
            h1 { font-size: 1.8rem; }
            p { font-size: 0.9rem; }
            .btn-group { flex-direction: column; width: 100%; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>

    <!-- Desktop Sidebar -->
    <div id="sidebar">
        <div class="brand">S. AI</div>
        <div class="nav-item active" onclick="switchView('hub', this)">
            <span class="icon">🏠</span><span class="label">Universal Hub</span>
        </div>
        <div class="nav-item" onclick="switchView('agency', this)">
            <span class="icon">🏢</span><span class="label">AI Agency</span>
        </div>
        <div class="nav-item" onclick="switchView('demo', this)">
            <span class="icon">🎭</span><span class="label">Bistro Experience</span>
        </div>
        <div class="nav-item" onclick="switchView('dashboard', this)">
            <span class="icon">⚙️</span><span class="label">Admin Dashboard</span>
        </div>
        <div class="nav-item" onclick="switchView('test', this)" style="margin-top: auto;">
            <span class="icon">🧪</span><span class="label">Technical Sandbox</span>
        </div>
    </div>

    <!-- Mobile Navigation -->
    <div id="mobile-nav">
        <div class="m-nav-item active" onclick="switchView('hub', this)"><span>🏠</span>Hub</div>
        <div class="m-nav-item" onclick="switchView('agency', this)"><span>🏢</span>Agency</div>
        <div class="m-nav-item" onclick="switchView('demo', this)"><span>🎭</span>Demo</div>
        <div class="m-nav-item" onclick="switchView('dashboard', this)"><span>⚙️</span>Admin</div>
    </div>

    <div id="view-container">
        <div id="welcome-screen">
            <h1>SHINJU AI CONSOLE</h1>
            <p>Master control for the Shinju Omni-Engine V3. Navigate between portals to manage your AI fleet.</p>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="window.location.href='/agency'">ENTER AGENCY</button>
                <button class="btn btn-outline" onclick="window.location.href='/demo_master'">COMMANDER / ORDER</button>
            </div>
        </div>

        <iframe id="iframe-agency" src="/agency_static" allow="microphone"></iframe>
        <iframe id="iframe-demo" src="/demo_static" allow="microphone"></iframe>
        <iframe id="iframe-dashboard" src="/dashboard_static" allow="microphone"></iframe>
        <iframe id="iframe-test" src="/test_static" allow="microphone"></iframe>
    </div>

    <!-- GLOBAL WIDGET -->
    <script src="/widget/chat.js"></script>

    <script>
        function switchView(viewId, el) {
            document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
            document.getElementById('welcome-screen').style.display = 'none';
            
            if (viewId === 'hub') {
                document.getElementById('welcome-screen').style.display = 'flex';
            } else {
                const frame = document.getElementById(`iframe-${viewId}`);
                if (frame) {
                    if (viewId === 'dashboard') frame.src = "/dashboard_static#analytics";
                    frame.classList.add('active');
                }
            }

            // Sync Desktop & Mobile active state
            document.querySelectorAll('.nav-item, .m-nav-item').forEach(i => i.classList.remove('active'));
            // Find equivalent elements by text content or icon if needed
            if (el) el.classList.add('active');
        }
    </script>
</body>
</html>
