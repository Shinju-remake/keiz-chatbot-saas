
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arpège - Bot-Botaniste Demo (Shinju AI)</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            background-color: #fcfaf5;
            color: #2e4d23; /* Forest Green */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-image: url('https://images.unsplash.com/photo-1550989460-0adf9ea622e2?q=80&w=2070&auto=format&fit=crop'); /* Garden background */
            background-size: cover;
            background-position: center;
        }
        .demo-overlay {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 600px;
            border: 1px solid #c8e6c9;
        }
        h1 { font-size: 2.5rem; margin-bottom: 5px; color: #2e4d23; font-style: italic; }
        p { font-size: 1.1rem; color: #444; line-height: 1.6; }
        .botanist-line {
            height: 3px;
            width: 80px;
            background-color: #4caf50;
            margin: 15px auto;
        }
        .cta-box {
            background-color: #2e4d23;
            color: white;
            padding: 12px;
            border-radius: 50px;
            margin-top: 25px;
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="demo-overlay">
        <h1>Arpège</h1>
        <p>Alain Passard</p>
        <div class="botanist-line"></div>
        <p>Welcome to the <strong>Shinju AI</strong> Garden-to-Table Experience.</p>
        <p>To interact with our <strong>Bot-Botaniste</strong>, please use the chat icon below.</p>
        <p>Try: <em>"What is the current harvest in the Sarthe garden?"</em> or <em>"Tell me about the 100% plant-based philosophy."</em></p>
        <div class="cta-box">
            Project 1.9K - Shinju AI x Arpège
        </div>
    </div>

    <!-- Shinju AI Widget Loader -->
    <script>
        (function() {
            var s = document.createElement('script');
            s.src = 'projects/chatbot_saas/widget/shinju-widget.js';
            s.async = true;
            s.onload = function() {
                window.ShinjuAI.init({
                    apiKey: 'arpege-demo-key-2026',
                    primaryColor: '#2e4d23',
                    logoUrl: 'https://cdn-icons-png.flaticon.com/512/1047/1047460.png',
                    subdomain: 'arpege'
                });
            };
            document.head.appendChild(s);
        })();
    </script>
</body>
</html>
